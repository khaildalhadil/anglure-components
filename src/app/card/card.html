<tr class="bg-neutral-primary border-b border-default">
  <th scope="row" class="px-6 py-3 font-medium text-heading whitespace-nowrap text-center">
    {{id}}
  </th>
  <th scope="row" class="px-6 py-3 font-medium text-heading whitespace-nowrap text-center">
    {{name}}
  </th>
  <td class="px-6 py-3 text-center">
    {{department}}
  </td>
  <td class="px-6 py-3 text-center">
    {{age}}
  </td>
  <td class="px-6 py-3 text-center">
    {{isMar}}
  </td>
  <td class="px-6 py-3 text-center">
    <span 
    class="px-2 rounded-full text-gray-100"
    [class]="{'bg-green-400': isMar, 'bg-red-400': !isMar}">
      {{workNow}}
    </span>
  </td>
  <td class="px-6 py-3 text-center flex gap-2 ">
    <button class="bg-blue-400 p-1 rounded cursor-pointer">
      <img class="h-5" src="edit-svgrepo-com.svg" alt=""></button>
    <button class="bg-red-400 p-1 rounded cursor-pointer"><img class="h-5" src="delete-1487-svgrepo-com.svg" alt=""></button>
  </td>
</tr>
