<div class="max-w-5xl mx-auto mt-10  rounded-lg overflow-hidden">

    <div class="flex justify-between my-5">
        <h1 class="text-2xl font-bold">All Employees</h1>
        <button class="bg-green-500 text-gray-100 p-2 rounded cursor-pointer">Add Employee</button>
    </div>
    
    <table class="w-full text-sm text-left shadow-lg">
        <thead class="bg-gray-900 text-white uppercase">
            <tr>
                <th class="px-6 py-3 text-center">Employee ID</th>
                <th class="px-6 py-3 text-center">Full Name</th>
                <th class="px-6 py-3 text-center">Department</th>
                <th class="px-6 py-3 text-center">Age</th>
                <th class="px-6 py-3 text-center">Is Mar</th>
                <th class="px-6 py-3 text-center">Work Now</th>
                <th class="px-6 py-3 text-center"></th>
            </tr>
        </thead>

        <tbody class="divide-y divide-gray-200 bg-white">

            @for(employee of employees; track employee.id) {
                <app-card
                    [id]="employee.id"
                    [name]="employee.name"
                    [department]="employee.department"
                    [age]="employee.age"
                    [isMar]="employee.isMar"
                    [workNow]="employee.workNow"
                >

                </app-card>
            }

        </tbody>
    </table>

</div>
